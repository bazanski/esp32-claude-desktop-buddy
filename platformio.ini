[env:seeed_xiao_esp32s3]
platform = espressif32@6.4.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
upload_speed = 115200
upload_flags = --no-stub
board_build.filesystem = littlefs
board_build.partitions = no_ota.csv
board_build.f_cpu = 240000000L
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DTFT_MOSI=9
    -DTFT_SCLK=7
    -DTFT_CS=2
    -DTFT_DC=3
    -DTFT_RST=4
    -DTFT_BL=43
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
build_src_filter = +<*> +<buddies/>
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    thomasfredericks/Bounce2 @ ^2.71
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32-c6-lcd]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 160000000L
board_build.flash_mode = qio
board_build.partitions = no_ota.csv



build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DUSER_SETUP_LOADED=1
    -DESP32_C6_LCD=1
    -DST7789_DRIVER=1
    -DTFT_INVERSION_ON=1
    -DCGRAM_OFFSET=1
    -DTFT_RGB_ORDER=1
    -DTFT_WIDTH=172
    -DTFT_HEIGHT=320
    -DTFT_MISO=2
    -DTFT_MOSI=6
    -DTFT_SCLK=7
    -DTFT_CS=14
    -DTFT_DC=15
    -DTFT_RST=21
    -DTFT_BL=22
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=27000000
build_src_filter = +<*> +<buddies/>
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    thomasfredericks/Bounce2 @ ^2.71
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32-c6-lcd-diag]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
monitor_speed = 115200
board_build.f_cpu = 160000000L
board_build.flash_mode = qio
build_flags =
    -DDIAG_BL=1
build_src_filter = +<diag_bl.cpp>
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.3

[env:esp32-s3-lcd-316]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-lcd-316
board_build.arduino.memory_type = qio_opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.partitions = no_ota.csv
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DESP32_S3_LCD_316=1
    -DBOARD_HAS_PSRAM
    -DCONFIG_SPIRAM=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    -DTFT_WIDTH=320
    -DTFT_HEIGHT=820
    -DTFT_MOSI=1
    -DTFT_SCLK=2
    -DTFT_CS=0
    -DTFT_DC=3
    -DTFT_RST=16
    -DTFT_BL=6
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DLOAD_FONT6=1
    -DLOAD_FONT7=1
    -DLOAD_FONT8=1
    -DLOAD_GFXFF=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=20000000
    "-I${PROJECT_DIR}/src/panel/st7701_bsp"
    "-I${PROJECT_DIR}/src/panel/io_additions"
build_src_filter = +<*> +<buddies/> +<panel/st7701_bsp/> +<panel/io_additions/>
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    thomasfredericks/Bounce2 @ ^2.71
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

[env:esp32-s3-lcd-316-diag]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-lcd-316
board_build.arduino.memory_type = qio_opi
framework = arduino
monitor_speed = 115200
upload_speed = 460800
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
build_flags =
    -DDIAG_S3_316=1
    -DESP32_S3_LCD_316=1
    -DBOARD_HAS_PSRAM
    "-I${PROJECT_DIR}/src/panel/st7701_bsp"
    "-I${PROJECT_DIR}/src/panel/io_additions"
build_src_filter = +<diag_s3_316.cpp> +<panel_rgb.cpp> +<panel/st7701_bsp/> +<panel/io_additions/>
